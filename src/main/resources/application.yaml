spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: spring-security-jwt-lab
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/${DB_NAME:security_lab}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  docker:
    compose:
      enabled: false

server:
  port: ${APP_PORT:8080}

application:
  security:
    jwt:
      access-secret: ${JWT_ACCESS_SECRET:change-me-change-me-change-me-change-me}
      refresh-secret: ${JWT_REFRESH_SECRET:change-me-change-me-change-me-change-me-refresh}
      access-expiration: ${JWT_ACCESS_EXPIRATION:900}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800}
